name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Audit prod deps (high+)
        # Prod-only: devDeps (vitest, @sqds/multisig) carry their own CVE chains
        # that never ship to operators. We only fail if something in `dist/`'s
        # runtime closure has a high-severity advisory.
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      - name: Install dashboard deps
        run: npm ci
        working-directory: dashboard

      - name: Typecheck (dashboard)
        run: npx tsc --noEmit
        working-directory: dashboard

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
