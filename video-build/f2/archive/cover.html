<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    background: #050505;
    overflow: hidden;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .badge {
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #c0392b;
    font-family: 'Courier New', monospace;
    margin-bottom: 28px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .badge.show { opacity: 1; }

  .title {
    font-size: 108px;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: #ffffff;
    text-align: center;
    line-height: 1;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .title.show { opacity: 1; transform: translateY(0); }

  .tagline {
    font-size: 24px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 48px;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .tagline.show { opacity: 1; }

  .line {
    width: 120px;
    height: 1px;
    background: #1a1a1a;
    margin-bottom: 32px;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .line.show { opacity: 1; }

  .sub {
    font-size: 15px;
    color: #2a2a2a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .sub.show { opacity: 1; }

  /* subtle vignette */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #000 100%);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="badge"  id="badge">F2 Pitch Video</div>
  <div class="title"  id="title">Custos Nox</div>
  <div class="tagline" id="tag">Real-time attack monitor for Solana DAOs</div>
  <div class="line"   id="line"></div>
  <div class="sub"    id="sub">Solana Frontier Hackathon · 2026</div>

<script>
  const s = id => document.getElementById(id).classList.add('show');
  setTimeout(() => s('badge'),  300);
  setTimeout(() => s('title'),  700);
  setTimeout(() => s('tag'),   1400);
  setTimeout(() => s('line'),  2000);
  setTimeout(() => s('sub'),   2400);
  setTimeout(() => { document.title = 'COVER_DONE'; }, 4500);
</script>
</body>
</html>
