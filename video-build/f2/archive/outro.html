<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1920px; height: 1080px;
    background: #080808;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  .logo {
    font-size: 72px;
    font-weight: 700;
    font-family: sans-serif;
    letter-spacing: 0.06em;
    color: #ffffff;
    opacity: 0;
    transition: opacity 1.0s ease;
    margin-bottom: 12px;
  }
  .logo.show { opacity: 1; }

  .tagline {
    font-size: 20px;
    color: #555;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.8s ease;
    margin-bottom: 60px;
  }
  .tagline.show { opacity: 1; }

  .divider {
    width: 480px;
    height: 1px;
    background: #222;
    opacity: 0;
    transition: opacity 0.8s ease;
    margin-bottom: 40px;
  }
  .divider.show { opacity: 1; }

  .stats {
    display: flex;
    gap: 64px;
    opacity: 0;
    transition: opacity 0.8s ease;
    margin-bottom: 48px;
  }
  .stats.show { opacity: 1; }

  .stat {
    text-align: center;
  }
  .stat-value {
    font-size: 36px;
    font-weight: 700;
    font-family: sans-serif;
    color: #c0c0c0;
    display: block;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 13px;
    color: #444;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .github {
    font-size: 18px;
    color: #444;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .github.show { opacity: 1; }
  .github span { color: #666; }

  /* subtle grain */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 999; opacity: 0.4;
  }
</style>
</head>
<body>
  <div class="logo"    id="logo">Custos Nox</div>
  <div class="tagline" id="tag">Real-time attack monitor for Solana DAOs</div>
  <div class="divider" id="div"></div>
  <div class="stats"   id="stats">
    <div class="stat">
      <span class="stat-value">4</span>
      <span class="stat-label">Detectors</span>
    </div>
    <div class="stat">
      <span class="stat-value">147</span>
      <span class="stat-label">Tests green</span>
    </div>
    <div class="stat">
      <span class="stat-value">MIT</span>
      <span class="stat-label">License</span>
    </div>
    <div class="stat">
      <span class="stat-value">Free</span>
      <span class="stat-label">Forever</span>
    </div>
  </div>
  <div class="github" id="gh"><span>github.com/</span>cryptoyasenka/custos-nox</div>

<script>
const s = id => document.getElementById(id).classList.add('show');
setTimeout(() => s('logo'),   800);
setTimeout(() => s('tag'),   1600);
setTimeout(() => s('div'),   2200);
setTimeout(() => s('stats'), 2800);
setTimeout(() => s('gh'),    3400);
setTimeout(() => { document.title = 'OUTRO_DONE'; }, 9000);
</script>
</body>
</html>
